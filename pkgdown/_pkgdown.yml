url: https://r-xla.github.io/anvl/
destination: docs

development:
  mode: auto
  version_label: default
  version_tooltip: "Version"

template:
  bootstrap: 5
  light-switch: true
  math-rendering: mathjax

toc:
  depth: 3

navbar:
  structure:
    left:  [reference, news, get_started, user_guide, examples, developers]
    right: [search, github, lightswitch]
  components:
    get_started:
      text: Get started
      menu:
      - text: Installation
        href: articles/installation.html
      - text: Get Started
        href: articles/anvl.html
    user_guide:
      text: User guide
      menu:
      - text: JIT Deep Dive
        href: articles/jit.html
      - text: Static Shape Restriction
        href: articles/static_shapes.html
      - text: Subsetting
        href: articles/subsetting.html
      - text: Random Number Generation
        href: articles/random-numbers.html
      - text: Type Promotion
        href: articles/type-promotion.html
      - text: Efficiency
        href: articles/efficiency.html
      - text: FAQ
        href: articles/faq.html
    examples:
      text: Examples
      menu:
      - text: Logistic Regression
        href: articles/logistic-regression.html
      - text: Metropolis Hastings
        href: articles/metropolis-hastings.html
      - text: Gaussian Process
        href: articles/gaussian-process.html
    developers:
      text: Developers
      menu:
      - text: Adding a Primitive
        href: articles/extending_primitive.html
      - text: Extending the API
        href: articles/extending_primitive.html
      - text: Internals
        href: articles/internals.html
      - text: Available Primitives
        href: articles/primitives.html

reference:
  - title: Array
    desc: Constructing and working with AnvlArrays

  - subtitle: Construction
    desc: Functions for creating and initializing arrays
    contents:
      - AnvlArray
      - nv_array
      - nv_scalar
      - nv_empty
      - nv_fill
      - nv_iota
      - nv_seq
      - nv_diag
      - nv_eye
      - arr

